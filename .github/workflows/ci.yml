name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pest-sqlite:
    name: Pest (SQLite, fast feedback)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, zip, intl
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('src/composer.lock', 'src/composer.json') }}

      - name: Install deps
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-oci8

      - name: Run pest
        run: vendor/bin/pest --colors=always

  pest-oracle:
    name: Pest (Oracle XE 21c, integration)
    runs-on: ubuntu-latest
    services:
      oracle:
        image: gvenzl/oracle-xe:21-slim-faststart
        env:
          ORACLE_PASSWORD: oracle
          APP_USER: mediacat
          APP_USER_PASSWORD: mediacat
        ports:
          - 1521:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 60s
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      # shivammathur/setup-php auto-installs Oracle Instant Client when oci8
      # is in the extensions list — no manual wget/unzip step required.
      - name: Setup PHP 8.3 (with oci8)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, zip, intl, oci8
          coverage: none
          tools: composer:v2

      - name: Install deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Wait for Oracle
        run: |
          for i in $(seq 1 30); do
            nc -z localhost 1521 && echo "oracle up" && exit 0
            sleep 5
          done
          echo "oracle did not come up" && exit 1

      - name: Run pest against Oracle
        env:
          DB_CONNECTION: oracle
          DB_HOST: 127.0.0.1
          DB_PORT: 1521
          DB_SERVICE_NAME: XEPDB1
          DB_USERNAME: mediacat
          DB_PASSWORD: mediacat
        run: vendor/bin/pest --colors=always --testsuite=Feature
